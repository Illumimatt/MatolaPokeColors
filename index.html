<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Paleta Pokémon Delta E</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
         :root {
            --background: #1b1b1b;
            --foreground: #FFFFF0;
            --card: #242424;
            --border: #3a3a3a;
            --input-bg: #1f1f1f;
            --primary: #dedede;
            --accent: #2e2e2e;
            --btn-random: #7628dd;
            --radius: 0.625rem;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 2px 4px -2px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s ease-in-out;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.025em;
        }

        .subtitle {
            font-size: 1rem;
            color: #62748e;
            margin-bottom: 40px;
            text-align: center;
        }

        .controls {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: var(--shadow-md);
            margin-bottom: 40px;
        }

        .color-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: 1px solid var(--border);
            width: 46px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

        input[type="text"] {
            flex: 1;
            padding: 10px 16px;
            font-size: 0.95rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--primary);
            font-weight: 500;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #90a1b9;
            box-shadow: 0 0 0 3px rgba(144, 161, 185, 0.2);
            background-color: var(--card);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--btn-random);
            color: #FFFFF0;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: var(--shadow-sm);
        }
        button:hover {
            background-color: #7628dd;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }

        #output-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        #output-container .color-row {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 20px;
            margin-bottom: 0;
        }

        #output-container .color-box-preview {
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        #output-container span {
            font-weight: 600;
            color: #FFFFF0 !important;
            text-transform: capitalize;
            letter-spacing: -0.01em;
        }
    </style>
</head>
<body>

    <h1>Gerador de Paleta Pokémon</h1>
    <p class="subtitle">Insira suas cores ou aleatorize para encontrar seus Pokémon ideais</p>

    <div class="controls">
        <div class="color-row">
            <input type="color" id="c1" value="#7A59C7">
            <input type="text" id="hex1" placeholder="#7A59C7" maxlength="7">
        </div>
        <div class="color-row">
            <input type="color" id="c2" value="#B68AA8">
            <input type="text" id="hex2" placeholder="#B68AA8" maxlength="7">
        </div>
        <div class="color-row">
            <input type="color" id="c3" value="#8A72D8">
            <input type="text" id="hex3" placeholder="#8A72D8" maxlength="7">
        </div>
        <div class="color-row">
            <input type="color" id="c4" value="#9C8CD6">
            <input type="text" id="hex4" placeholder="#9C8CD6" maxlength="7">
        </div>
        <button id="btn-aleatorio">🎲 Paleta Aleatória</button>
    </div>

    <div id="output-container"></div>

    <script type="py" src="./app.py" config='{"packages": ["requests", "numpy", "matplotlib", "pillow"]}' async></script>

</body>
</html>
